services:
  uptime-node:
    build:
      context: .
      dockerfile: Dockerfile
    image: uptime-node:latest
    container_name: uptime-node
    ports:
      - "${PORT:-6038}:${PORT:-6038}"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
